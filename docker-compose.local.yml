# Local Environment - For development and manual testing via localhost
# Usage: docker compose -f docker-compose.local.yml up

services:
  # WordPress + WooCommerce
  wordpress:
    image: wordpress:6.8-php8.2-apache
    container_name: aztecwp_local_wordpress
    ports:
      - "8080:80"
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress
      WORDPRESS_TABLE_PREFIX: wp_
    volumes:
      - wordpress_local_data:/var/www/html
    depends_on:
      - db
    networks:
      - localnet

  # MySQL Database
  db:
    image: mysql:8.0
    container_name: aztecwp_local_db
    ports:
      - "3307:3306"  # Different port to avoid conflict with test environment
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wordpress
      MYSQL_PASSWORD: wordpress
    volumes:
      - db_local_data:/var/lib/mysql
    networks:
      - localnet

  # PHP container for WP-CLI and development
  php:
    build:
      context: .
      dockerfile: Dockerfile.test
    container_name: aztecwp_local_php
    ports:
      - "9004:9003"  # Different Xdebug port
    volumes:
      - .:/app
      - wordpress_local_data:/var/www/html
    working_dir: /app
    depends_on:
      - wordpress
      - db
    networks:
      - localnet
    environment:
      - WORDPRESS_DB_HOST=db:3306
      - WORDPRESS_DB_NAME=wordpress
      - WORDPRESS_DB_USER=wordpress
      - WORDPRESS_DB_PASSWORD=wordpress
      - WORDPRESS_URL=http://localhost:8080
      - WORDPRESS_ADMIN_URL=http://localhost:8080/wp-admin
      - XDEBUG_MODE=debug
      - XDEBUG_TRIGGER=1
      - PHP_IDE_CONFIG=serverName=localhost
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  wordpress_local_data:
  db_local_data:

networks:
  localnet:
    driver: bridge
